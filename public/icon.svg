<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#534AB7"/>
      <stop offset="100%" stop-color="#3C3489"/>
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAC775"/>
      <stop offset="100%" stop-color="#D85A30" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <g transform="translate(64,68)">
    <!-- Shadow -->
    <ellipse cx="0" cy="34" rx="32" ry="5" fill="#26215C" opacity="0.5"/>

    <!-- Rocket body -->
    <path d="M0,-46 C-14,-46 -22,-28 -22,-4 L22,-4 C22,-28 14,-46 0,-46Z" fill="white" opacity="0.95"/>

    <!-- Nose cone -->
    <ellipse cx="0" cy="-46" rx="9" ry="10" fill="white"/>

    <!-- Window -->
    <circle cx="0" cy="-18" r="6.5" fill="#3C3489"/>
    <circle cx="0" cy="-18" r="4" fill="white" opacity="0.3"/>

    <!-- Fins -->
    <path d="M-22,-14 L-36,6 L-22,-4Z" fill="white" opacity="0.8"/>
    <path d="M22,-14 L36,6 L22,-4Z" fill="white" opacity="0.8"/>

    <!-- Nozzle -->
    <rect x="-5" y="-4" width="10" height="7" rx="1.5" fill="white" opacity="0.6"/>

    <!-- Flames -->
    <path d="M-9,3 Q-12,16 -8,28 Q0,22 8,28 Q12,16 9,3Z" fill="url(#flame)"/>
    <path d="M-4,3 Q-5,14 0,22 Q5,14 4,3Z" fill="#FAC775" opacity="0.9"/>

    <!-- Stars -->
    <circle cx="-38" cy="-38" r="2.5" fill="white" opacity="0.6"/>
    <circle cx="40" cy="-44" r="1.5" fill="white" opacity="0.4"/>
    <circle cx="44" cy="-28" r="1" fill="white" opacity="0.3"/>
  </g>
</svg>
